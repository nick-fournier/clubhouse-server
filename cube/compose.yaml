name: cube-db

services:
  postgres:
    image: nichfournier/launchpad-postgres:latest  # Default: Pull from remote
    container_name: cube-postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ${BACKUP_PATH}:/backups
      - .env:/etc/environment:ro

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cube-pgadmin
    restart: unless-stopped
    env_file: .env
    ports:
      - 8080:80
    volumes:
      - pgadmin_data:/var/lib/pgadmin   # persist saved server connections across recreates

volumes:
  # Pin to the EXISTING live volume. 
  # Without this, a project named cube-db would create
  # an empty cube-db_pg_data and Postgres would boot with no data.
  pg_data:
    name: postgres_pg_data
  pgadmin_data:
