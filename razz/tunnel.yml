ingress:
  # Hobby site — served locally by the gateway nginx.
  - hostname: "launchpad.nicholasfournier.com"
    service: http://nginx:80

  # router.nicholasfournier.com fans out by path (no rewrite — the API
  # namespaces are disjoint): MOTIS transit (/api/...) → thinkbox:8080, OSRM
  # (everything else: /route, /table, /nearest, /match, /trip, /tile) → orange.
  # Both workers reached over Tailscale (MagicDNS). Rules match top-to-bottom.
  - hostname: "router.nicholasfournier.com"
    path: "^/api/.*"
    service: http://thinkbox:8080
  - hostname: "router.nicholasfournier.com"
    service: http://orange:5000

  - service: http_status:404
