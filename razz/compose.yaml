name: razz

# Control plane on the Pi4: the public front door (Cloudflare tunnel),
# and the light Django hobby site.
# No bandwidth-heavy or untrusted-data workloads live here.

services:
  web:
    image: nichfournier/launchpad-web:latest
    container_name: web
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - DJANGO_ENV=production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    networks:
      - razz-network

  nginx:
    image: nginx:1.27.3-perl
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - razz-network

  tunnel:
    image: cloudflare/cloudflared:2024.12.2
    container_name: tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /app/config.yml run
    volumes:
      - ./tunnel.yml:/app/config.yml
    environment:
      - TUNNEL_ID=${TUNNEL_ID}
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      - TZ=${TZ}
    depends_on:
      - web
    networks:
      - razz-network

volumes:
  static_volume:
  media_volume:
  portainer_data:

networks:
  razz-network:
    driver: bridge
    name: razz-network
