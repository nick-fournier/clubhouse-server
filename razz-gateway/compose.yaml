name: razz-gateway

# Control plane on the Pi4: the single management dashboard, the public front
# door (Cloudflare tunnel), and the light Django hobby site. No bandwidth-heavy
# or untrusted-data workloads live here.

services:
  # Single-pane dashboard. Add orange (and later thinkbox/cube) as Agent
  # endpoints over Tailscale: Environments -> Add -> Agent -> orange:9001.
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9443:9443"   # HTTPS UI
      - "8000:8000"   # optional: Edge agent tunnel (unused with standard agents)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - razz-network

  web:
    image: nichfournier/launchpad-web:latest
    container_name: web
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - DJANGO_ENV=production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    networks:
      - razz-network

  nginx:
    image: nginx:1.27.3-perl
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - razz-network

  tunnel:
    image: cloudflare/cloudflared:2024.12.2
    container_name: tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /app/config.yml run
    volumes:
      - ./tunnel.yml:/app/config.yml
    environment:
      - TUNNEL_ID=${TUNNEL_ID}
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      - TZ=${TZ}
    depends_on:
      - web
    networks:
      - razz-network

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    ports:
      - "61208:61208"
    environment:
      - TZ=${TZ}
      - GLANCES_OPT=-w   # web interface
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    pid: host
    networks:
      - razz-network

volumes:
  static_volume:
  media_volume:
  portainer_data:

networks:
  razz-network:
    driver: bridge
    name: razz-network
